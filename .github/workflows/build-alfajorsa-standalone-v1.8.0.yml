      - name: Build standalone QA APK
        shell: bash
        run: |
          gradle --no-daemon -p android-standalone :app:assembleQa
          cp android-standalone/app/build/outputs/apk/qa/app-qa.apk ALFAJORSA_v1.8.0_QA_STANDALONE.apk

      - name: Verify APK package, content and permissions
        shell: bash
        run: |
          set -euo pipefail
          APK="ALFAJORSA_v1.8.0_QA_STANDALONE.apk"
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/35.0.0"

          test -s "$APK"
          sha256sum "$APK" | tee ALFAJORSA_v1.8.0_QA_STANDALONE.apk.sha256
          "$BUILD_TOOLS/aapt" dump badging "$APK" | tee APK_BADGING.txt
          "$BUILD_TOOLS/aapt" dump permissions "$APK" | tee APK_PERMISSIONS.txt
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK" | tee APK_SIGNATURE.txt

          grep -q "package: name='com.alfajorsa.app'" APK_BADGING.txt
          grep -q "versionCode='18001'" APK_BADGING.txt
          if grep -q "android.permission.INTERNET" APK_PERMISSIONS.txt; then
            echo "Unexpected INTERNET permission" >&2
            exit 1
          fi

          unzip -p "$APK" assets/index.html > EMBEDDED_ALFAJORSA_INDEX.html
          for token in \
            'CLÁSICO' 'BLANCO' 'PISTACHO' 'CAFÉ' \
            'CARAMELO SALADO' 'AVELLANA' 'FRUTOS DEL BOSQUE' 'LIMÓN' \
            'ALFAJORSA_ANDROID.openWhatsApp'; do
            grep -q "$token" EMBEDDED_ALFAJORSA_INDEX.html
          done

          cat > APK_BUILD_STATUS.txt <<'STATUS'
          BUILD_STATUS=PASS
          PACKAGE=com.alfajorsa.app
          VERSION_NAME=1.8.0-qa1
          VERSION_CODE=18001
          SOURCE=embedded-local-html
          INTERNET_PERMISSION=absent
          METRO_REQUIRED=no
          DEVICE_QA=pending
          STATUS

      - name: Upload install package
        uses: actions/upload-artifact@v4
        with:
          name: ALFAJORSA-v1.8.0-QA-STANDALONE
          path: |
            ALFAJORSA_v1.8.0_QA_STANDALONE.apk
            ALFAJORSA_v1.8.0_QA_STANDALONE.apk.sha256
            APK_BUILD_STATUS.txt
            APK_BADGING.txt
            APK_PERMISSIONS.txt
            APK_SIGNATURE.txt
            EMBEDDED_ALFAJORSA_INDEX.html
          if-no-files-found: error
          retention-days: 30
