name: Build ALFAJORSA Standalone Android v1.8.0

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-alfajorsa-standalone-v1.8.0.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build and verify standalone QA APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 build packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Restore standalone Android project
