name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'agent/**'
    paths:
      - 'App.tsx'
      - 'index.ts'
      - 'app.json'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/android-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npm run typecheck

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ALFAJORSA-Android-v0.2.0-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALFAJORSA-Android-v0.2.0-debug
          path: ALFAJORSA-Android-v0.2.0-debug.apk
          if-no-files-found: error
          retention-days: 30
